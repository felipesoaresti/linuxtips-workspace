apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-transacoes
  namespace: tipsbank-transacoes
  labels:
    app: api-transacoes
    app.kubernetes.io/name: api-transacoes
    app.kubernetes.io/part-of: tipsbank
    team: tipsbank
    env: production
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-transacoes
  template:
    metadata:
      labels:
        app: api-transacoes
        app.kubernetes.io/name: api-transacoes
        app.kubernetes.io/part-of: tipsbank
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: api-transacoes
                topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 65532
      initContainers:
        - name: init-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service.tipsbank-contas.svc.cluster.local 5432; do
                echo "Verificando conexão com Postgres..."
                sleep 3
              done
        - name: init-api-contas
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q --spider http://api-contas.tipsbank-contas.svc.cluster.local:8080/health/live; do
                echo "Verificando se api-contas esta live..."
                sleep 3
                done
      containers:
        - name: api-transacoes
          image: felipestaypuff/tipsbank-api-transacoes:v2.0.0
          ports:
            - containerPort: 8080
              name: api-transacoes
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: transacoes-secret
                  key: DB_URL
            - name: CONTAS_URL
              valueFrom:
                configMapKeyRef:
                  name: transacoes-config
                  key: CONTAS_URL
            - name: AUDITORIA_URL
              valueFrom:
                configMapKeyRef:
                  name: transacoes-config
                  key: AUDITORIA_URL
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: transacoes-config
                  key: APP_VERSION
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: transacoes-config
                  key: LOG_LEVEL
          volumeMounts:
            - mountPath: /var/log/app
              name: app-logs
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 0
            timeoutSeconds: 3
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 0
            timeoutSeconds: 3
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3

        - name: log-forwarder
          image: busybox:1.36
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          command:
            - sh
            - -c
            - |
              until [ -f /var/log/app/app.log ]; do echo "Aguardando o arquivo de log ser criado..."; sleep 1; done;
              tail -F /var/log/app/app.log
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - mountPath: /var/log/app
              name: app-logs
      volumes:
        - name: app-logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: api-transacoes
  namespace: tipsbank-transacoes
  labels:
    app: api-transacoes
    app.kubernetes.io/name: api-transacoes
    app.kubernetes.io/part-of: tipsbank
spec:
  type: ClusterIP
  selector:
    app: api-transacoes
  ports:
    - port: 8080
      targetPort: 8080
      name: api-transacoes
