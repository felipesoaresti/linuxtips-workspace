## Para o Canary Deploy no Tb-lab pos Helm
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-transacoes-v2
  namespace: tipsbank-transacoes
  labels:
    app: api-transacoes-v2
    version: v2
    team: tipsbank
    env: lab
    app.kubernetes.io/name: api-transacoes-v2
    app.kubernetes.io/part-of: tipsbank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-transacoes-v2
  template:
    metadata:
      labels:
        app: api-transacoes-v2
        version: v2
        app.kubernetes.io/name: api-transacoes-v2
        app.kubernetes.io/part-of: tipsbank
    spec:
      initContainers:
        - name: init-postgres
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z postgres-service.tipsbank-contas.svc.cluster.local 5432; do echo 'aguardando postgres'; sleep 3; done",
            ]
        - name: init-api-contas
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until wget -q --spider http://api-contas.tipsbank-contas.svc.cluster.local:8080/health/live; do echo 'aguardando api-contas'; sleep 3; done",
            ]
      containers:
        - name: api-transacoes
          image: felipestaypuff/tipsbank-api-transacoes:v2.0.0
          ports:
            - containerPort: 8080
              name: api-transacoes
          env:
            - name: APP_VERSION
              value: "v2"
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: transacoes-secret
                  key: DB_URL
            - name: CONTAS_URL
              valueFrom:
                configMapKeyRef:
                  name: transacoes-config
                  key: CONTAS_URL
            - name: AUDITORIA_URL
              valueFrom:
                configMapKeyRef:
                  name: transacoes-config
                  key: AUDITORIA_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: transacoes-config
                  key: LOG_LEVEL
          volumeMounts:
            - mountPath: /var/log/app
              name: app-logs
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
          startupProbe:
            httpGet: { path: /health/live, port: 8080 }
            initialDelaySeconds: 5
            failureThreshold: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health/live, port: 8080 }
            initialDelaySeconds: 5
            timeoutSeconds: 3
            periodSeconds: 3
            successThreshold: 1
            failureThreshold: 5
        - name: log-forwarder
          image: busybox:1.36
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          command:
            [
              "sh",
              "-c",
              "until [ -f /var/log/app/app.log ]; do sleep 1; done; tail -F /var/log/app/app.log",
            ]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 100m, memory: 128Mi }
          volumeMounts:
            - mountPath: /var/log/app
              name: app-logs
      volumes:
        - name: app-logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: api-transacoes-v2
  namespace: tipsbank-transacoes
  labels:
    app: api-transacoes-v2
    version: v2
    app.kubernetes.io/name: api-transacoes-v2
    app.kubernetes.io/part-of: tipsbank
spec:
  type: ClusterIP
  selector:
    app: api-transacoes-v2
  ports:
    - port: 8080
      targetPort: 8080
      name: api-transacoes
