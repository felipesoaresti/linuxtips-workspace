apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tipsbank-auditoria-ingress
  namespace: tipsbank-auditoria
  labels:
    app: auditoria
    app.kubernetes.io/name: auditoria
    app.kubernetes.io/part-of: tipsbank
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    cert-manager.io/cluster-issuer: "prod-letsencrypt-cloudflare"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api-{{ .Values.global.domain }}
      secretName: api-tipsbank-tls
  rules:
    - host: api-{{ .Values.global.domain }}
      http:
        paths:
          - path: /auditoria(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auditoria
                port:
                  number: 8080
