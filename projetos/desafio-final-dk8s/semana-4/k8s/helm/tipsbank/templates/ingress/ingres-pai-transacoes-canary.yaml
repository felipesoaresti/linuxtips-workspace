apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tipsbank-api-transacoes-canary
  namespace: tipsbank-transacoes
  labels:
    app: api-transacoes-v2
    version: v2
    app.kubernetes.io/name: api-transacoes-v2
    app.kubernetes.io/part-of: tipsbank
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10"
    nginx.ingress.kubernetes.io/canary-by-header: "X-Canary"
    nginx.ingress.kubernetes.io/canary-by-header-value: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.{{ .Values.global.domain }}
      http:
        paths:
          - path: /transacoes(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-transacoes-v2
                port:
                  number: 8080
