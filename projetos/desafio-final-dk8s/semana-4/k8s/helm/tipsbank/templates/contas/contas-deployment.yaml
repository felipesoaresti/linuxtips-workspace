apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-contas
  namespace: tipsbank-contas
  labels:
    app: api-contas
    app.kubernetes.io/name: api-contas
    app.kubernetes.io/part-of: tipsbank
    team: tipsbank
    env: production
spec:
  # replicas omitido de propósito: gerenciado pelo HPA hpa-api-contas.
  # Templar replicas aqui conflita no server-side apply com o kube-controller-manager
  # (dono de .spec.replicas via subresource /scale) e quebra o helm upgrade.
  selector:
    matchLabels:
      app: api-contas
  template:
    metadata:
      labels:
        app: api-contas
        app.kubernetes.io/name: api-contas
        app.kubernetes.io/part-of: tipsbank
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: api-contas
                topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 65532
      initContainers:
        - name: init-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service.tipsbank-contas.svc.cluster.local 5432; do
                echo "Verificando conexão com Postgres..."
                sleep 3
              done
      containers:
        - name: api-contas
          image: {{ .Values.global.registry }}/{{ .Values.contas.image.name }}:{{ .Values.contas.image.tag }}
          ports:
            - containerPort: 8080
              name: api-contas
          envFrom:
            - secretRef:
                name: contas-secret
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 0
            timeoutSeconds: 3
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 0
            timeoutSeconds: 3
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: api-contas
  namespace: tipsbank-contas
  labels:
    app: api-contas
    app.kubernetes.io/name: api-contas
    app.kubernetes.io/part-of: tipsbank
spec:
  type: ClusterIP
  selector:
    app: api-contas
  ports:
    - port: 8080
      targetPort: 8080
      name: api-contas
