apiVersion: v1
kind: Pod
metadata:
  name: debug-nfs
  namespace: tipsbank-auditoria
spec:
  securityContext:
    fsGroup: 65532
  containers:
    - name: debug
      image: busybox:1.36
      command: [ "sleep", "infinity" ]
      volumeMounts:
        - name: data
          mountPath: /data
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: auditoria-pvc
