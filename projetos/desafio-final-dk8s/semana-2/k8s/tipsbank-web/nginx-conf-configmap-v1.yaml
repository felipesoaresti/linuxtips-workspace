apiVersion: v1
kind: ConfigMap
metadata:
  namespace: tipsbank-web
  name: nginx-conf
  labels:
    app: web
    kubernetes.io/name: web
    kubernetes.io/part-of: tipsbank
data:
  nginx.conf: |
    # nginx config pro frontend TipsBank.
    # - Serve os arquivos estaticos em /
    # - Faz proxy reverso para as APIs internas em /api/<servico>/*
    # - Em producao (Kubernetes), o mesmo comportamento pode ser obtido com
    #   um Ingress separando paths — mas manter o proxy no proprio frontend
    #   simplifica CORS e locks o contrato com cada upstream.

    worker_processes auto;
    pid /tmp/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      keepalive_timeout 65;

      # nginx-unprivileged (user 101) precisa dessas paths gravaveis
      client_body_temp_path /tmp/client_body;
      proxy_temp_path       /tmp/proxy;
      fastcgi_temp_path     /tmp/fastcgi;
      uwsgi_temp_path       /tmp/uwsgi;
      scgi_temp_path        /tmp/scgi;

      # Upstreams — os hostnames batem com os service names do docker-compose
      # e devem bater tambem com os Services Kubernetes (namespace/service).

      upstream contas     { server api-contas.tipsbank-contas.svc.cluster.local:8081; }
      upstream transacoes { server api-transacoes.tipsbank-transacoes.svc.cluster.local:8082; }
      upstream auditoria  { server auditoria.tipsbank-auditoria.svc.cluster.local:8083; }

      server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # health check propria do frontend
        location = /healthz {
          access_log off;
          return 200 "ok\n";
        }

        # API: contas
        location /api/contas/ {
          proxy_pass         http://contas/;
          proxy_http_version 1.1;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API: transacoes
        location /api/transacoes/ {
          proxy_pass         http://transacoes/;
          proxy_http_version 1.1;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API: auditoria
        location /api/auditoria/ {
          proxy_pass         http://auditoria/;
          proxy_http_version 1.1;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # SPA fallback — qualquer rota que nao achar, volta pro index.html
        location / {
          try_files $uri $uri/ /index.html;
        }
      }
    }
