apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: tipsbank-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.3.110-192.168.3.120

---

apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: tipsbank-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - tipsbank-pool
