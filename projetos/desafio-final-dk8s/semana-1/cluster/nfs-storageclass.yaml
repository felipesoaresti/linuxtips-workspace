apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-tp-data
provisioner: nfs.csi.k8s.io
parameters:
  server: 192.168.3.11
  share: /mnt/nfs-data/k8s
  mountPermissions: "0777"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
mountOptions:
  - nfsvers=4.1
  - hard
  - intr

---

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-tp-delete
provisioner: nfs.csi.k8s.io
parameters:
  server: 192.168.3.11
  share: /mnt/nfs-data/k8s
  mountPermissions: "0777"
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
mountOptions:
  - nfsvers=4.1
  - hard
  - intr
