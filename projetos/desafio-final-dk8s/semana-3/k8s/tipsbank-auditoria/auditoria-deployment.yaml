apiVersion: apps/v1
kind: Deployment
metadata:
  name: auditoria
  namespace: tipsbank-auditoria
  labels:
    app: auditoria
    app.kubernetes.io/name: auditoria
    app.kubernetes.io/part-of: tipsbank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auditoria
  template:
    metadata:
      labels:
        app: auditoria
        app.kubernetes.io/name: auditoria
        app.kubernetes.io/part-of: tipsbank
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: auditoria
                topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 65532
      containers:
        - name: auditoria
          image: felipestaypuff/tipsbank-auditoria:v1.0.0
          ports:
            - containerPort: 8080
              name: auditoria
          env:
            - name: DATA_DIR
              value: /data
            - name: LOG_LEVEL
              value: INFO
          volumeMounts:
            - name: data-volume
              mountPath: /data
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 0
            timeoutSeconds: 3
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 0
            timeoutSeconds: 3
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: auditoria-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auditoria-pvc
  namespace: tipsbank-auditoria
  labels:
    app: auditoria
    app.kubernetes.io/name: auditoria
    app.kubernetes.io/part-of: tipsbank
spec:
  storageClassName: nfs-tp-data
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: auditoria
  namespace: tipsbank-auditoria
  labels:
    app: auditoria
    app.kubernetes.io/name: auditoria
    app.kubernetes.io/part-of: tipsbank
spec:
  type: ClusterIP
  selector:
    app: auditoria
  ports:
    - port: 8080
      targetPort: 8080
      name: auditoria
