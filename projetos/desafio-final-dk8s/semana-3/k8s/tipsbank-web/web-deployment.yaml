apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: tipsbank-web
  labels:
    app: web
    kubernetes.io/name: web
    kubernetes.io/part-of: tipsbank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        kubernetes.io/name: web
        kubernetes.io/part-of: tipsbank
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: web
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: init-contas
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until wget -q --spider http://api-contas.tipsbank-contas.svc.cluster.local:8080/health/live; do echo 'Verificando se api-contas esta live...'; sleep 3; done;",
            ]
        - name: init-transacoes
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until wget -q --spider http://api-transacoes.tipsbank-transacoes.svc.cluster.local:8080/health/live; do echo 'Verificando se api-transacoes esta live...'; sleep 3; done;",
            ]
        - name: init-auditoria
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until wget -q --spider http://auditoria.tipsbank-auditoria.svc.cluster.local:8080/health/live; do echo 'Verificando se auditoria esta live...'; sleep 3; done;",
            ]
      containers:
        - name: web
          image: felipestaypuff/tipsbank-web:v1.0.0
          ports:
            - containerPort: 8080
              name: web
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-conf-v2

---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: tipsbank-web
  labels:
    app: web
    kubernetes.io/name: web
    kubernetes.io/part-of: tipsbank
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: web
      port: 8080
      targetPort: 8080
