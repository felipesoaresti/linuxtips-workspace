apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tipsbank-slo-alerts
  namespace: tipsbank-monitoring
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: tipsbank-slo-alerts
    app.kubernetes.io/part-of: tipsbank
spec:
  groups:
    - name: tipsbank.availability
      interval: 30s
      rules:
        - alert: TipsBankApiDown
          expr: up{namespace=~"tipsbank-.*"} == 0
          for: 2m
          labels:
            severity: critical
            team: tipsbank
          annotations:
            summary: "API TipsBank indisponível"
            description: "O job {{ $labels.job }} está down há mais de 2 minutos. Namespace: {{ $labels.namespace }}"
    - name: tipsbank.latency
      interval: 30s
      rules:
        - alert: TipsBankP99Alto
          expr: |
            histogram_quantile(0.99,
              sum by (le, job, namespace) (
                rate(http_request_duration_seconds_bucket{namespace=~"tipsbank-.*"}[5m])
              )
            ) > 0.5
          for: 5m
          labels:
            severity: warning
            team: tipsbank
          annotations:
            summary: "Latência p99 acima de 500ms"
            description: "p99 de {{ $labels.job }} ({{ $labels.namespace }}) = {{ $value | humanizeDuration }}. SLO violado."
    - name: tipsbank.errors
      interval: 30s
      rules:
        - alert: TipsBankErroAltoApi
          expr: |
            sum by (job, namespace) (
              rate(http_requests_total{namespace=~"tipsbank-.*", status=~"5.."}[3m])
            )
            /
            sum by (job, namespace) (
              rate(http_requests_total{namespace=~"tipsbank-.*"}[3m])
            ) > 0.05
          for: 3m
          labels:
            severity: critical
            team: tipsbank
          annotations:
            summary: "Taxa de erros 5xx acima de 5%"
            description: "{{ $labels.job }} com {{ $value | humanizePercentage }} de erros 5xx nos últimos 3 minutos."
    - name: tipsbank.stability
      interval: 30s
      rules:
        - alert: TipsBankPodCrashLoop
          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace=~"tipsbank-.*",
                container!~"log-forwarder|init-.*"
              }[10m]
            ) > 3
          for: 0m
          labels:
            severity: warning
            team: tipsbank
          annotations:
            summary: "Pod em CrashLoop"
            description: "Container {{ $labels.container }} no pod {{ $labels.pod }} ({{ $labels.namespace }}) reiniciou mais de 3 vezes em 10 minutos."
