apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-collector
  namespace: tipsbank-monitoring
  labels:
    app: node-collector
    app.kubernetes.io/part-of: tipsbank
spec:
  selector:
    matchLabels:
      app: node-collector
  template:
    metadata:
      labels:
        app: node-collector
    spec:
      tolerations:
        - key: "compliance"
          operator: "Equal"
          value: "strict"
          effect: "NoSchedule"
      containers:
        - name: node-collector
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                echo "$(date) node=$(hostname) disk=$(df -h / | tail -1 | awk '{print $5}')";
                sleep 30;
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
      volumes:
        - name: host-root
          hostPath:
            path: /
